<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tahtam — Yasal Bilgiler</title>
<style>
  :root { --primary:#007AFF; --text:#1C1C1E; --muted:#8E8E93; --border:#E5E5EA; --bg:#FFFFFF; --card:#F2F2F7; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text); background: var(--bg); margin: 0; padding: 0; line-height: 1.6; }
  .container { max-width: 720px; margin: 0 auto; padding: 80px 24px; text-align: center; }
  h1 { font-size: 40px; margin: 0 0 12px; letter-spacing: -0.8px; }
  .tagline { color: var(--muted); font-size: 17px; margin-bottom: 48px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 32px; text-align: left; }
  @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
  .card { display: block; background: var(--card); padding: 24px; border-radius: 16px; text-decoration: none; color: var(--text); transition: transform 0.15s; }
  .card:hover { transform: translateY(-2px); }
  .card h3 { margin: 0 0 6px; font-size: 18px; }
  .card p { margin: 0; color: var(--muted); font-size: 14px; }
  footer { color: var(--muted); font-size: 13px; margin-top: 80px; }
</style>
</head>
<body>
<div class="container">
  <h1>Tahtam</h1>
  <p class="tagline">Pazaryeri tahta (stand) yönetimi için profesyonel B2B uygulama.</p>

  <div class="grid">
    <a class="card" href="privacy.html">
      <h3>Gizlilik Politikası</h3>
      <p>Toplanan veriler ve kullanım amaçları (KVKK uyumlu).</p>
    </a>
    <a class="card" href="terms.html">
      <h3>Kullanım Şartları</h3>
      <p>Hizmet kuralları ve sorumluluklar.</p>
    </a>
    <a class="card" href="support.html">
      <h3>Destek</h3>
      <p>SSS, hata bildirimi ve iletişim.</p>
    </a>
  </div>

  <footer>© 2026 Tahtam · <a href="mailto:ozgurtuna111@hotmail.com" style="color:var(--primary); text-decoration:none">ozgurtuna111@hotmail.com</a></footer>
</div>
</body>
</html>
